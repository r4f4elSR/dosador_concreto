name: dosador_concreto
description: "Um aplicativo simples que calcula o traço do concreto."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8
  go_router: ^17.3.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  hive_ce_generator: ^1.9.2
  flutter_markdown: ^0.7.7+1

flutter:
  uses-material-design: true

  assets:
    - assets/texts/

flutter_native_splash:
  
  color: "#f7f9ff"
  image: "assets/icon/Icon_Android12.png"
  fullscreen: true

  android_12:
    color: "#f7f9ff"
    image: "assets/icon/Icon_Android12.png"
